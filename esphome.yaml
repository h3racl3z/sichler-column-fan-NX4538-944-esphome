# Allgemeine Einstellungen:
esphome:
  name: sichler-fan              # name in home assistant
  friendly_name: Sichler Column Fan
  area: Bedroom

esp8266:                            # board-type
  board: esp01_1m

logger:                             # log-level
  baud_rate: 0
  level: INFO

# ------------------------------------------------------------------------------------------------------

# HomeAssistant-API:
api:
  encryption:
    key: !secret encryption_key

# OTA-Updates:
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi-Einstellungen:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "sichler column fan"
    password: !secret ap_password
captive_portal:

# ------------------------------------------------------------------------------------------------------

uart:
  rx_pin: GPIO3
  tx_pin: GPIO1
  baud_rate: 9600

tuya:

fan:
  - platform: tuya
    name: "Sichler Column Fan"
    switch_datapoint: 1
    speed_datapoint: 2
    oscillation_datapoint: 8
    speed_count: 3
