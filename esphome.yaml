# Board:
esphome:
  name: turmventilator              # Name in HomeAssistant
  friendly_name: Turmventilator
  area: Arbeitszimmer

esp8266:                            # Board-Typ
  board: esp01_1m

logger:                             # Log-Level
  baud_rate: 0
  level: WARN

# ------------------------------------------------------------------------------------------------------

# HomeAssistant-API:
api:
  encryption:
    key: !secret sichler_turmventilator_nx4538_9__encryption_key

# OTA-Updates:
ota:
  - platform: esphome
    password: !secret turmventilator__ota_password

# WiFi-Settings:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Turmventilator"
    password: !secret ap_password
captive_portal:

# Web-Server:
web_server:
  port: 80
  version: 3
  include_internal: false
  auth:
    username: admin
    password: !secret webserver_password
# ------------------------------------------------------------------------------------------------------

uart:
  rx_pin: GPIO3
  tx_pin: GPIO1
  baud_rate: 9600

tuya:

fan:
  - platform: tuya
    name: "Sichler Turmventilator"
    switch_datapoint: 1
    speed_datapoint: 2
    oscillation_datapoint: 8
    speed_count: 3
